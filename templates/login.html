{% extends 'base.html' %}

{% block conteudo %}

<div class="pai_login">
    <div class="card_login">
        <form action="{{url_for('login')}}" method="post">
            <label class="my-2">
                email:
                <input placeholder="Digite seu email" name="form-email" class="form-control w-100">
            </label>

            <label class="my-2">
                senha:
                <input placeholder="Digite sua senha" name="form-senha" class="form-control w-100">
            </label>

            <button type="submit" class="btn btn-info my-2">Entrar</button>
        </form>

    </div>
</div>


<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
    Cadastro
</button>

<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
     aria-labelledby="staticBackdropLabel" aria-hidden="true">

    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="staticBackdropLabel">Modal title</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <form class="form-somar" action="{{ url_for('cadastro_funcionario') }}" method="post">

                    <label>
                        Nome:
                        <input placeholder="Digite o nome" name="form-nome" class="form-control w-100">
                    </label>

                    <label>
                        Data de Nascimento:
                        <input placeholder="Digite o data de nasccimento" name="form-data" type="date"
                               class="form-control w-100">
                    </label>

                    <label>
                        CPF:
                        <input placeholder="Digite o seu CPF" name="form-cpf" class="form-control w-100">
                    </label>

                    <label>
                        Email:
                        <input placeholder="Digite seu Email" name="form-email" class="form-control w-100">
                    </label>

                    <label>
                        Senha:
                        <input placeholder="Digite sua senha" name="form-senha" class="form-control w-100">
                    </label>

                    <label>
                        Cargo:
                        <input placeholder="Digite o seu cargo" name="form-cargo" class="form-control w-100">
                    </label>

                    <label>
                        Salário:
                        <input placeholder="Digite o seu salário" name="form-salario"
                               class="form-control w-100">
                    </label>

                    <button type="submit" class="btn btn-info">Cadastrar</button>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>


{% endblock %}
